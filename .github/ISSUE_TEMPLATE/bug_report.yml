name: Bug report
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect to happen, and what actually happened?
      placeholder: When I do X, I expect Y, but Z happens instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version / environment
      description: Browser, OS, app version, commit SHA — whatever's relevant
    validations:
      required: false
